{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Kool Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="{% static 'myapp/vendor/bootstrap/css/bootstrap.min.css' %}">
    <!-- Login / Signup CSS -->
    <link rel="stylesheet" href="{% static 'myapp/css/signup.css' %}">
</head>
<body>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
                {{ message }}
            </li>
        {% endfor %}
    </ul>
    {% endif %}

    

<!-- HEADER -->
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand" href="#"></a>
    </div>
</nav>

<!-- SIGNUP FORM -->
<div class="login-wrapper">
    <div class="login-card">
        <h2>Create Account</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" class="form-control" placeholder="Enter full name" required>
            </div>

            <div class="form-group mt-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="form-group mt-3">
                <label>Password</label>
                <input type="password" name="password1" class="form-control" placeholder="Create password" required>
            </div>

            <div class="form-group mt-3">
                <label>Confirm Password</label>
                <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="btn btn-kool btn-block mt-4">
                Sign Up
            </button>

            <div class="login-links">
                <p class="mt-3">
                    Already have an account?
                    <a href="{% url 'login_view' %}">Login</a>
                </p>
            </div>
        </form>
    </div>
</div>

</body>
</html>
