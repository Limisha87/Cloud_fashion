{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Kool Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="{% static 'myapp/vendor/bootstrap/css/bootstrap.min.css' %}">
    <!-- Login / Signup CSS -->
    <link rel="stylesheet" href="{% static 'myapp/css/signup.css' %}">
</head>
<body>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
                {{ message }}
            </li>
        {% endfor %}
    </ul>
    {% endif %}

    

<!-- HEADER -->
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand" href="#"></a>
    </div>
</nav>

<!-- SIGNUP FORM -->
<form method="post">
    {% csrf_token %}

    <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter email" required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password1" placeholder="Enter password" required>
    </div>

    <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="password2" placeholder="Confirm password" required>
    </div>

    <button type="submit" class="signup-btn">Sign Up</button>
</form>

        <div class="login-link">
            Already have an account?
            <a href="/login/">Login</a>
        </div>
    </div>
</div>


</body>
</html>
