{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Kool Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{% static 'myapp/css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'myapp/css/login.css' %}">

</head>
<body>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
                {{ message }}
            </li>
        {% endfor %}
    </ul>
    {% endif %}

<!-- HEADER (Same as Kool Store) -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="#"></a>
    </div>
</nav>

<!-- LOGIN FORM -->
<div class="login-wrapper">
    <div class="login-card">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="form-group mt-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-kool btn-block mt-4">
                Login
            </button>

            <div class="login-links">
                <p class="mt-3">
                    Don't have an account?
                    <a href="{% url 'signup_view' %}">Sign Up</a>
                </p>
            </div>
        </form>
    </div>
</div>

</body>
</html>
